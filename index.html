<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revent – Demos</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F5F5F5;
      color: #212121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #E0E0E0;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: #FF6B00;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg { width: 18px; height: 18px; }

    .logo-text {
      font-size: 20px;
      font-weight: 800;
      color: #212121;
      letter-spacing: -0.5px;
    }

    .logo-text span { color: #FF6B00; }

    .header-tag {
      margin-left: auto;
      font-size: 12px;
      font-weight: 600;
      color: #9E9E9E;
      background: #F5F5F5;
      padding: 4px 10px;
      border-radius: 6px;
    }

    main {
      flex: 1;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 24px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #212121;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 15px;
      color: #616161;
      margin-bottom: 36px;
    }

    .demos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 20px;
    }

    .demo-card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #E0E0E0;
      overflow: hidden;
      transition: box-shadow 0.15s ease, transform 0.15s ease;
      color: inherit;
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }

    .demo-card:hover {
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }

    .demo-card-accent {
      height: 6px;
    }

    .demo-card-body {
      padding: 20px 24px 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .demo-card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .demo-type-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      background: #F5F5F5;
      color: #616161;
    }

    .demo-location {
      font-size: 12px;
      color: #9E9E9E;
    }

    .demo-icon {
      font-size: 28px;
      margin-bottom: 8px;
      display: block;
    }

    .demo-name {
      font-size: 18px;
      font-weight: 700;
      color: #212121;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .demo-edition {
      font-size: 12px;
      font-weight: 600;
      color: #9E9E9E;
      margin-bottom: 10px;
    }

    .demo-description {
      font-size: 14px;
      color: #616161;
      line-height: 1.5;
      flex: 1;
      margin-bottom: 20px;
    }

    .demo-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .demo-dates {
      font-size: 12px;
      color: #9E9E9E;
    }

    .demo-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      transition: filter 0.15s;
      white-space: nowrap;
    }

    .demo-btn:hover { filter: brightness(0.9); }

    .demo-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #BDBDBD;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
    </div>
    <span class="logo-text">Re<span>vent</span></span>
    <span class="header-tag">Demos</span>
  </header>

  <main>
    <div class="demos-grid" id="demos-grid">
      <!-- Rendered by JS -->
    </div>
  </main>

  <footer>Marco Labs · Revent</footer>

  <script>
    const demos = [
      {
        param:       'platillos',
        icon:        '🍽️',
        name:        'A la tardor, platillos',
        edition:     '11a edició',
        type:        'Ruta gastronòmica',
        location:    "L'Hospitalet de Llobregat",
        dates:       '6 – 23 nov 2025',
        description: "28 establiments participants amb un platillo + beguda per 4,50€. Mostra el seguiment en temps real d'una ruta gastronòmica municipal.",
        color:       '#FF6B00',
      },
    ];

    const extras = [
      {
        icon:        '📊',
        name:        'Presentació — Ajuntament de L\'H',
        type:        'Presentació',
        description: 'Presentació completa de Revent per a l\'Ajuntament de L\'Hospitalet de Llobregat.',
        color:       '#1565C0',
        href:        'presentacion.html',
      },
    ];

    const grid = document.getElementById('demos-grid');

    const demoCards = demos.map(d => `
      <div class="demo-card" onclick="location.href='app.html?demo=${d.param}'">
        <div class="demo-card-accent" style="background:${d.color}"></div>
        <div class="demo-card-body">
          <div class="demo-card-meta">
            <span class="demo-type-badge">${d.type}</span>
            <span class="demo-location">${d.location}</span>
          </div>
          <span class="demo-icon">${d.icon}</span>
          <div class="demo-name">${d.name}</div>
          <div class="demo-edition">${d.edition}</div>
          <p class="demo-description">${d.description}</p>
          <div class="demo-card-footer">
            <span class="demo-dates">${d.dates}</span>
            <a class="demo-btn" href="app.html?demo=${d.param}" style="background:${d.color}" onclick="event.stopPropagation()">
              Obrir demo
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </a>
          </div>
        </div>
      </div>
    `);

    const extraCards = extras.map(e => `
      <div class="demo-card" onclick="location.href='${e.href}'">
        <div class="demo-card-accent" style="background:${e.color}"></div>
        <div class="demo-card-body">
          <div class="demo-card-meta">
            <span class="demo-type-badge">${e.type}</span>
          </div>
          <span class="demo-icon">${e.icon}</span>
          <div class="demo-name">${e.name}</div>
          <p class="demo-description">${e.description}</p>
          <div class="demo-card-footer">
            <span></span>
            <a class="demo-btn" href="${e.href}" style="background:${e.color}" onclick="event.stopPropagation()">
              Obrir
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </a>
          </div>
        </div>
      </div>
    `);

    grid.innerHTML = [...demoCards, ...extraCards].join('');
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Tactic – Revent</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23FF6B00' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m11 19-1.106-.552a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0l4.212 2.106a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619V12'/><path d='M15 5.764V12'/><path d='M18 15v6'/><path d='M21 18h-6'/><path d='M9 3.236v15'/></svg>">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Dashboard CSS -->
  <link rel="stylesheet" href="assets/css/dashboard.css" />
</head>
<body>

  <!-- Sticky header -->
  <header id="dash-header">
    <div class="header-left">
      <a href="app.html" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Mapa
      </a>
      <div class="header-divider"></div>
      <img src="https://hospitaletturisme.l-h.cat/img/logo_LHTurisme.png" alt="L'Hospitalet Turisme" class="header-logo">
      <div class="header-event" id="header-event">
        <!-- Filled by JS -->
      </div>
    </div>
    <span class="dash-badge">Panel del Promotor</span>
  </header>

  <!-- Scrollable dashboard -->
  <main id="dash-main">

    <!-- Row 1: Digital Impact (data + map) -->
    <section class="dash-row" id="row-digital">
      <div class="card card-full" id="card-digital">
        <div class="card-header">
          <h2>Impacte Digital</h2>
          <p class="card-subtitle">Metriques de la plataforma durant l'esdeveniment</p>
        </div>
        <div class="split-layout">
          <div class="split-data" id="digital-data">
            <!-- Filled by JS: KPIs, rate, chart -->
          </div>
          <div class="split-map-wrap">
            <div id="digital-map"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Row 1b: Participants -->
    <section class="dash-row" id="row-participants">
      <div class="card card-full" id="card-participants">
        <div class="card-header">
          <h2>Participants</h2>
          <p class="card-subtitle">Detall per establiment adherit a l'esdeveniment</p>
        </div>
        <div id="participants-data">
          <!-- Filled by JS: top list, tags, report CTA -->
        </div>
      </div>
    </section>

    <!-- Row 2: Territory (data + map) -->
    <section class="dash-row" id="row-territori">
      <div class="card card-full" id="card-territori">
        <div class="card-header">
          <h2>Territori</h2>
          <p class="card-subtitle">Intelligencia geografica per anell d'isocrona</p>
        </div>
        <div id="iso-selector"></div>
        <div class="split-layout">
          <div class="split-data" id="terr-data">
            <!-- Filled by JS: metrics, donut, income, mobility -->
          </div>
          <div class="split-map-wrap">
            <div id="terr-map"></div>
            <div class="map-legend" id="map-legend"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Row 3: Actions -->
    <section class="dash-row" id="row-accions">
      <div class="card card-full" id="card-accions">
        <div class="card-header">
          <div class="card-header-row">
            <div>
              <h2>Accions</h2>
              <p class="card-subtitle">Campanyes de notificacio i els seus resultats</p>
            </div>
            <button class="action-new-btn" id="btn-new-action">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Nova accio
            </button>
          </div>
        </div>
        <div id="accions-body">
          <!-- Filled by JS -->
        </div>
      </div>
    </section>

    <!-- Row 4: Score + Conditions -->
    <section class="dash-row" id="row-score">
      <div class="card card-score" id="card-score">
        <!-- Filled by JS -->
      </div>
      <div class="card card-conditions" id="card-conditions">
        <!-- Filled by JS -->
      </div>
    </section>

  </main>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Leaflet Heat -->
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <!-- Dashboard modules -->
  <script src="assets/js/dashboard-map.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
